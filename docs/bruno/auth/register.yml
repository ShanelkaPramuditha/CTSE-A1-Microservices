info:
  name: register
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "name": "John Doe",
        "email": "john@example.com",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
