name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # --- Lint & Build ---
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

      - name: Build API Gateway
        run: pnpm run build:gateway

      - name: Build User Service
        run: pnpm run build:user

      - name: Build Product Service
        run: pnpm run build:product

      - name: Build Order Service
        run: pnpm run build:order

      - name: Build Payment Service
        run: pnpm run build:payment

  # --- Docker Build ---
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api-gateway/Dockerfile
          push: false
          tags: ecommerce/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build User Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/user-service/Dockerfile
          push: false
          tags: ecommerce/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Product Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/product-service/Dockerfile
          push: false
          tags: ecommerce/product-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Order Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/order-service/Dockerfile
          push: false
          tags: ecommerce/order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Payment Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/payment-service/Dockerfile
          push: false
          tags: ecommerce/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Integration Test with Docker Compose ---
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          PORT_API_GATEWAY=3000
          USER_SERVICE_HOST=user-service
          USER_SERVICE_PORT=4001
          PRODUCT_SERVICE_HOST=product-service
          PRODUCT_SERVICE_PORT=4002
          ORDER_SERVICE_HOST=order-service
          ORDER_SERVICE_PORT=4003
          PAYMENT_SERVICE_HOST=payment-service
          PAYMENT_SERVICE_PORT=4004
          MONGO_URI_USER=mongodb://mongo:27017/user-db
          MONGO_URI_PRODUCT=mongodb://mongo:27017/product-db
          MONGO_URI_ORDER=mongodb://mongo:27017/order-db
          MONGO_URI_PAYMENT=mongodb://mongo:27017/payment-db
          JWT_SECRET=ci-test-secret
          JWT_EXPIRATION=3600s
          EOF

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 30
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:3000/api/v1 || true

      - name: Health check - API Gateway
        run:
          curl -f http://localhost:3000/api/docs || echo "Swagger docs
          available"

      - name: Stop services
        if: always()
        run: docker compose down -v
