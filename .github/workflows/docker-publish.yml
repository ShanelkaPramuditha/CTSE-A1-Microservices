name: Microservices Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag
        required: true
        default: latest

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.repository.default_branch }}
          ref: ${{ github.ref }}
          filters: |
            common:
              - 'libs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'nest-cli.json'
            api_gateway:
              - 'apps/api-gateway/**'
            user_service:
              - 'apps/user-service/**'
            product_service:
              - 'apps/product-service/**'
            cart_service:
              - 'apps/cart-service/**'
            order_service:
              - 'apps/order-service/**'

      - name: Build dynamic matrix
        id: matrix
        uses: actions/github-script@v7
        with:
          script: |
            const common = '${{ steps.filter.outputs.common }}' === 'true';

            const changed = {
              apiGateway: common || '${{ steps.filter.outputs.api_gateway }}' === 'true',
              userService: common || '${{ steps.filter.outputs.user_service }}' === 'true',
              productService: common || '${{ steps.filter.outputs.product_service }}' === 'true',
              cartService: common || '${{ steps.filter.outputs.cart_service }}' === 'true',
              orderService: common || '${{ steps.filter.outputs.order_service }}' === 'true',
            };

            const include = [];
            if (changed.apiGateway) {
              include.push({ service: 'api-gateway', dockerfile: 'apps/api-gateway/Dockerfile', image: 'api-gateway' });
            }
            if (changed.userService) {
              include.push({ service: 'user-service', dockerfile: 'apps/user-service/Dockerfile', image: 'user-service' });
            }
            if (changed.productService) {
              include.push({ service: 'product-service', dockerfile: 'apps/product-service/Dockerfile', image: 'product-service' });
            }
            if (changed.cartService) {
              include.push({ service: 'cart-service', dockerfile: 'apps/cart-service/Dockerfile', image: 'cart-service' });
            }
            if (changed.orderService) {
              include.push({ service: 'order-service', dockerfile: 'apps/order-service/Dockerfile', image: 'order-service' });
            }

            core.setOutput('matrix', JSON.stringify({ include }));
            core.setOutput('has_changes', include.length > 0 ? 'true' : 'false');

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image registry prefix
        id: image
        run: |
          echo "prefix=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags:
            ${{ steps.image.outputs.prefix }}/${{ matrix.image }}:${{
            steps.tag.outputs.value }}
          cache-from: type=gha,scope=ecom-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=ecom-${{ matrix.service }}

  no-changes:
    name: No Service Changes
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip publish
        run: echo "No changed service paths detected. Skipping Docker publish."
